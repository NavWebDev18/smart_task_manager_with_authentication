<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style1.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/f67495d90a.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="login-bg-container d-flex justify-content-center align-items-center">
        <form class="form-container" id = "loginForm">
            <div class="text-center">
                <h1 class="login-title">Login</h1>
            </div>
            <div class="mb-3">
                <label for="userName" class="mb-2">Username</label>
                <br/>
                <input type="text" placeholder="Username" id="userName" class="user-input w-90 p-2">
            </div>
            <div class="mb-4">
                <label for="userPassword" class="mb-2">password</label>
                <br />
                <input type="password" placeholder="password" id="userPassword" class="user-input w-90 p-2">
            </div>
            <button class="custom-button">Login</button>
            <span>Don't have an acount?  <a href="register.html" class="register">Register</a></span>
        </form>
    </div>
    <script src="auth.js"></script>
</body>
</html>
